name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: apps/api
    env:
      APP_ENV: ci
      DATABASE_URL: mysql+pymysql://prospectiq:prospectiq@127.0.0.1:3306/prospectiq
      JWT_SECRET: ci-super-secret-jwt-key-at-least-32-bytes
      SERPAPI_API_KEY: ci-serpapi-placeholder
      AI_PROVIDER: stub
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff
        run: python -m ruff check app tests migrations --config pyproject.toml

      - name: Mypy
        run: python -m mypy app --config-file pyproject.toml

      - name: Pytest
        run: python -m pytest -q

      - name: Alembic offline migration render
        run: python -m alembic upgrade head --sql > /tmp/alembic.sql

  docker-validate:
    name: Container Build Validation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: ./apps/api
            file: ./apps/api/Dockerfile
            build_args: ""
          - component: web
            context: ./apps/web
            file: ./apps/web/Dockerfile
            build_args: VITE_API_BASE_URL=
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=ci-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.component }}
          provenance: false
          sbom: false

  deploy-smoke:
    name: Deployment Stack Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build API image
        run: docker build -t leadscope-ci-api:${{ github.sha }} ./apps/api

      - name: Build web image
        run: docker build --build-arg VITE_API_BASE_URL= -t leadscope-ci-web:${{ github.sha }} ./apps/web

      - name: Prepare deployment env
        shell: bash
        run: |
          cp infra/deploy.env.example /tmp/leadscope-deploy.env
          python - <<'PY'
          from pathlib import Path

          path = Path("/tmp/leadscope-deploy.env")
          replacements = {
              "API_IMAGE=ghcr.io/yusufjojeh/prospectiq-api:latest": "API_IMAGE=leadscope-ci-api:${{ github.sha }}",
              "WEB_IMAGE=ghcr.io/yusufjojeh/prospectiq-web:latest": "WEB_IMAGE=leadscope-ci-web:${{ github.sha }}",
              "WEB_PORT=80": "WEB_PORT=8080",
              "WEB_ORIGIN=https://leadscope.example.com": "WEB_ORIGIN=http://127.0.0.1:8080",
              "WEB_ORIGINS=https://leadscope.example.com": "WEB_ORIGINS=http://127.0.0.1:8080",
              "DEFAULT_ADMIN_EMAIL=admin@example.com": "DEFAULT_ADMIN_EMAIL=admin@leadscope.test",
              "DEFAULT_ADMIN_PASSWORD=replace-admin-password": "DEFAULT_ADMIN_PASSWORD=ChangeMe123!",
              "JWT_SECRET=replace-with-a-long-random-secret": "JWT_SECRET=ci-super-secret-jwt-key-at-least-32-bytes",
              "SERPAPI_API_KEY=replace-with-serpapi-key": "SERPAPI_API_KEY=ci-serpapi-placeholder",
          }
          content = path.read_text()
          for old, new in replacements.items():
              content = content.replace(old, new)
          path.write_text(content)
          PY

      - name: Start deployment stack
        run: docker compose --env-file /tmp/leadscope-deploy.env -f infra/docker-compose.deploy.yml up -d

      - name: Verify deployment stack
        run: sh infra/scripts/verify_deploy_stack.sh /tmp/leadscope-deploy.env infra/docker-compose.deploy.yml

      - name: Tear down deployment stack
        if: always()
        run: docker compose --env-file /tmp/leadscope-deploy.env -f infra/docker-compose.deploy.yml down -v

  frontend:
    name: Frontend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: apps/web
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E
        env:
          CI: "true"
        run: npm run test:e2e -- --workers=2

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-test-results
          path: |
            apps/web/test-results
            apps/web/playwright-report
